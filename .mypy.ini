[mypy]
# General settings
python_version = 3.9
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_any_unimported = False
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
check_untyped_defs = True
strict_optional = True

# Import discovery
mypy_path = qBRA
namespace_packages = True
explicit_package_bases = True

# Error messages
show_error_codes = True
show_column_numbers = True
show_error_context = True
pretty = True

# Exclude patterns
exclude = (?x)(
    ^\.venv/
    | ^venv/
    | ^build/
    | ^dist/
    | ^\.git/
    | ^__pycache__/
    | \.pyc$
  )

# QGIS/PyQt stubs - these don't have type stubs, so we allow untyped
[mypy-qgis.*]
ignore_missing_imports = True

[mypy-qgis.PyQt.*]
ignore_missing_imports = True

[mypy-PyQt5.*]
ignore_missing_imports = True

[mypy-PyQt6.*]
ignore_missing_imports = True

# Gradual typing - can be removed once 100% typed
# For now during refactoring, we'll be adding these progressively

# Future: remove these once files are fully typed
# [mypy-qBRA.modules.*]
# disallow_untyped_defs = False
